# 아임웹(자사몰·비즈몰) 데이터 수집 — 매일 05:00 KST (20:00 UTC)
# 저장 위치: .github/workflows/imweb_sync.yml

name: imweb-sync

on:
  schedule:
    - cron: '0 20 * * *'   # 20:00 UTC = 05:00 KST
  workflow_dispatch:        # 수동 실행 버튼
    inputs:
      backfill_days:
        description: '주문 소급 일수 (비우면 기본값)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests cryptography

      - name: Fetch Imweb data
        env:
          IMWEB_JASA_KEY: ${{ secrets.IMWEB_JASA_KEY }}
          IMWEB_JASA_SECRET: ${{ secrets.IMWEB_JASA_SECRET }}
          IMWEB_BIZ_KEY: ${{ secrets.IMWEB_BIZ_KEY }}
          IMWEB_BIZ_SECRET: ${{ secrets.IMWEB_BIZ_SECRET }}
          IMWEB_DASH_PASSWORD: ${{ secrets.IMWEB_DASH_PASSWORD }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days }}
        run: python fetch_imweb.py

      - name: Fetch GA4 traffic (Secrets 설정 시에만 동작)
        continue-on-error: true
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SA_JSON: ${{ secrets.GA4_SA_JSON }}
          IMWEB_DASH_PASSWORD: ${{ secrets.IMWEB_DASH_PASSWORD }}
        run: python fetch_ga4.py

      - name: Commit data
        run: |
          git config user.name "imweb-sync-bot"
          git config user.email "actions@github.com"
          git add data/imweb_store.json.enc data/imweb_dash.json.enc
          git add data/ga4_daily.json.enc || true
          git diff --staged --quiet || git commit -m "chore: imweb data sync $(date -u +%F)"
          git push
